name: Daily News Crawl

on:
  schedule:
    - cron: '0 22 * * *'   # 한국 오전  7시 KST (UTC 22:00 전날)
    - cron: '0  1 * * *'   # 한국 오전 10시 KST (UTC 01:00)
    - cron: '0  4 * * *'   # 한국 오후  1시 KST (UTC 04:00)
    - cron: '0  7 * * *'   # 한국 오후  4시 KST (UTC 07:00)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run crawler
        run: python3 crawl_naver_news.py

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: daily crawl $(date +'%Y-%m-%d')"
          git push
